name: Unzip and commit

on:
  workflow_dispatch:

jobs:
  unzip-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Ensure unzip is available
        run: sudo apt-get update && sudo apt-get install -y unzip || true

      - name: Unpack zip and commit
        env:
          BRANCH: unzip/binance-runtime-minimal
        run: |
          if [ ! -f "binance-runtime-minimal.zip" ]; then
            echo "Error: binance-runtime-minimal.zip not found in repo root" >&2
            exit 1
          fi
          unzip -o binance-runtime-minimal.zip -d extracted || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH" || git checkout -b "$BRANCH"
          git add -A extracted
          if git commit -m "Unpack binance-runtime-minimal.zip"; then
            git push -u origin "$BRANCH"
            echo "Unpacked and pushed to branch $BRANCH"
          else
            echo "No changes to commit. Nothing pushed."
          fi
